worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    client_max_body_size 100M;

    upstream backend_upstream {
        server backend:8000;
    }

    upstream frontend_upstream {
        server frontend:80;
    }

    # Server blocks live in conf.d/default.conf, rendered from
    # templates/default.conf.template at container start (the official
    # nginx image's envsubst-on-templates entrypoint script) so the HTTPS
    # redirect target can use the externally-mapped HTTPS_PORT.
    include /etc/nginx/conf.d/*.conf;
}
