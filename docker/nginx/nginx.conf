worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    client_max_body_size 100M;

    # 127.0.0.11 is Docker's embedded DNS server, always available on any
    # user-defined bridge network. A short valid= TTL matters here: without
    # it (or with a static `upstream {}` block, which resolves once at
    # startup and never again), nginx caches backend/frontend's IP for its
    # entire process lifetime. Recreating either container - a deploy, or
    # just Docker's own `restart: unless-stopped` after a crash - gives it a
    # new IP that nginx keeps ignoring, serving 502s until nginx itself is
    # manually restarted. With this, nginx re-resolves within ~10s on its
    # own, no restart needed, regardless of why the container's IP changed.
    # (See default.conf.template - this only takes effect there because
    # proxy_pass is given a *variable*, not a literal hostname; nginx only
    # honors `resolver` for variable-based proxy_pass targets.)
    resolver 127.0.0.11 valid=10s;

    # Server blocks live in conf.d/default.conf, rendered from
    # templates/default.conf.template at container start (the official
    # nginx image's envsubst-on-templates entrypoint script) so the HTTPS
    # redirect target can use the externally-mapped HTTPS_PORT.
    include /etc/nginx/conf.d/*.conf;
}
