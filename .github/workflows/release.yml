name: Release

# Cuts a release when a version tag is pushed: builds multi-arch (amd64 +
# arm64) backend and frontend images, pushes them to GHCR, and creates a
# GitHub Release. Publishing the code stays on the `main` branch's own CI
# (docker-build.yml); this workflow is only about shipping tagged artifacts.
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# One-time after the first run: make the two new packages public under
# https://github.com/users/manojmkss/packages so `docker compose pull` works
# without authentication (Package settings -> Change visibility -> Public).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push images to GHCR

env:
  # GHCR requires lowercase names; the repo is "Light_NVR" so this is spelled
  # out lowercase rather than derived from ${{ github.repository }}.
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/light_nvr

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
          - name: frontend
            context: ./frontend
    steps:
      - uses: actions/checkout@v4

      # arm64 is built under emulation on the x86 runner - slower than native
      # but keeps the whole build in one free job. Most deps install from
      # prebuilt arm64 wheels/apt packages, so there's no heavy compilation.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive version (strip the leading v)
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:latest
          # Reuse layers between releases to keep repeat builds fast.
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  release:
    needs: images
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Prebuilt images for this release (multi-arch: amd64 + arm64):

            - `ghcr.io/${{ github.repository_owner }}/light_nvr-backend:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository_owner }}/light_nvr-frontend:${{ github.ref_name }}`

            Install / upgrade:

            ```bash
            # download the code (git clone or the ZIP - see the README), then:
            docker compose pull && docker compose up -d
            ```

            No build step needed - the images above are pulled directly. See
            [CHANGELOG.md](CHANGELOG.md) for what changed.
